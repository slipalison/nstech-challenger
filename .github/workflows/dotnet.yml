name: .NET Core CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: |
        dotnet restore
        dotnet tool restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-restore --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./TestResults

    - name: Mutation Test
      run: |
        dotnet stryker --configuration Release | tee stryker.log
        if grep -q "The final mutation score is NaN%" stryker.log; then
          echo "Mutation score is NaN%. Check if mutants are being generated."
          exit 1
        fi

    - name: Mutation Summary
      if: always()
      run: |
        REPORT_PATH=$(find StrykerOutput -name "mutation-report.md" | head -n 1)
        if [ -n "$REPORT_PATH" ]; then
          cat "$REPORT_PATH" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Mutation Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mutation-report
        path: StrykerOutput/

    - name: Check Coverage
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: TestResults/**/coverage.cobertura.xml
        badge: true
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: false
        indicators: true
        output: both
        thresholds: '80 80'
